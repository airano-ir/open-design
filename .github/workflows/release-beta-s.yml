# Self-hosted release-beta lane. Hosted baseline remains release-beta.yml.
name: release-beta-s

on:
  workflow_dispatch:
    inputs:
      enable_win:
        description: "Run the Windows self-hosted beta lane."
        required: true
        type: boolean
        default: true
      publish:
        description: "Publish release assets and metadata. Keep disabled while validating the runner lane."
        required: true
        type: boolean
        default: false
      release_version:
        description: "Local beta candidate version for no-publish self-hosted validation."
        required: true
        type: string
        default: "0.8.1-beta.0"
      s3_public_origin:
        description: "Explicit anonymous-read public origin for the self-hosted S3 publish target."
        required: true
        type: string
        default: ""
      update_metadata_url:
        description: "Optional external updater metadata URL for full Windows smoke."
        required: true
        type: string
        default: ""
      update_target_version:
        description: "Optional external updater target version expected by full Windows smoke."
        required: true
        type: string
        default: ""
      smoke_mode:
        description: "Windows smoke coverage."
        required: true
        type: choice
        options:
          - fast
          - core
          - full
        default: full
      target:
        description: "Windows build target."
        required: true
        type: choice
        options:
          - nsis
          - all
          - zip
          - dir
        default: nsis
      sign_mode:
        description: "Windows signing mode."
        required: true
        type: choice
        options:
          - auto
          - off
          - on
        default: auto

permissions:
  contents: read
  actions: read

concurrency:
  group: release-beta-s-win
  cancel-in-progress: false

jobs:
  build_win:
    name: Build Windows beta candidate
    if: ${{ inputs.enable_win }}
    runs-on: [self-hosted, Windows, X64, nexu-win, release-beta]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          clean: false
          fetch-depth: 1
          lfs: false

      - name: Build beta candidate
        shell: cmd
        env:
          OD_PACKAGED_E2E_WIN_UPDATE_METADATA_URL: ${{ inputs.update_metadata_url }}
          OD_PACKAGED_E2E_WIN_UPDATE_VERSION: ${{ inputs.update_target_version }}
        run: |
          @echo on
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File .github\scripts\release\build-beta.ps1 -Platform win -Lane self-hosted -Namespace release-beta-win -ReleaseVersion "${{ inputs.release_version }}" -SmokeMode "${{ inputs.smoke_mode }}" -Target "${{ inputs.target }}" -SignMode "${{ inputs.sign_mode }}"

      - name: Publish beta candidate to Nexu S3
        id: publish
        if: ${{ inputs.publish }}
        shell: cmd
        env:
          S3_ENDPOINT: ${{ secrets.NEXU_S3_ENDPOINT }}
          S3_REGION: ${{ secrets.NEXU_S3_REGION }}
          S3_BUCKET: ${{ secrets.NEXU_S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.NEXU_S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.NEXU_S3_SECRET_ACCESS_KEY }}
          S3_PUBLIC_ORIGIN: ${{ inputs.s3_public_origin || vars.NEXU_S3_PUBLIC_ORIGIN }}
        run: |
          @echo on
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File .github\scripts\release\publish-beta.ps1 -IndexPath "C:\.tmp\runner\od-beta\win\index\index.json" -ChannelPrefix beta -Platform win -Probe -Publish

      - name: Probe published beta candidate public read
        if: ${{ inputs.publish }}
        shell: cmd
        run: |
          @echo on
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File .github\scripts\release\probe-beta-public-read.ps1 -MetadataUrl "${{ steps.publish.outputs.metadata_url }}"

      - name: Publish local summary
        if: ${{ always() }}
        shell: cmd
        run: |
          @echo on
          echo workspace=%GITHUB_WORKSPACE%
          echo runner_temp=%RUNNER_TEMP%
          echo runner_tool_cache=%RUNNER_TOOL_CACHE%
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "if ($env:GITHUB_WORKSPACE -like 'C:\Users\runner\Projects\*') { throw 'GITHUB_WORKSPACE must not point at the operator Projects directory' }"
          if exist "C:\.tmp\runner\od-beta\win\summary.md" echo local_summary=C:\.tmp\runner\od-beta\win\summary.md
