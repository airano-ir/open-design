  <defs>
    <filter id="svg-bloom" x="-100%" y="-100%" width="300%" height="300%">
      <feComponentTransfer in="SourceGraphic" result="bright">
        <feFuncR type="linear" slope="3.90" intercept="-3.51"/>
        <feFuncG type="linear" slope="3.90" intercept="-3.51"/>
        <feFuncB type="linear" slope="3.90" intercept="-3.51"/>
      </feComponentTransfer>
      <feGaussianBlur in="bright" stdDeviation="9.5" result="bloomSmall"/>
      <feGaussianBlur in="bright" stdDeviation="19.0" result="bloomLarge"/>
      <feMerge result="bloomMerge">
        <feMergeNode in="bloomLarge"/>
        <feMergeNode in="bloomSmall"/>
      </feMerge>
      <feBlend in="SourceGraphic" in2="bloomMerge" mode="screen"/>
    </filter>
  </defs>
